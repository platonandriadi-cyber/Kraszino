<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kraszino</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a0f2e, #0a0514);
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-content: center;
            min-height: 90vh;
        }
        h1 {
            color: #ffcc00;
            font-size: 32px;
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
        }
        .welcome {
            font-size: 16px;
            color: #b3a2cf;
            margin-bottom: 40px;
        }
        .btn {
            background: linear-gradient(135deg, #0088cc, #006699);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            border-radius: 14px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.4);
            margin: 10px auto;
            width: 80%;
            max-width: 300px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>🎰 KRASZINO 🎰</h1>
    <p class="welcome">Добро пожаловать в ваше личное Telegram казино!</p>
    <button class="btn" onclick="sayHello()">Испытать удачу</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function sayHello() {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
            tg.showAlert('Привет! Кнопка работает отлично. Совсем скоро здесь появятся игры Мины, Слоты и Краш!');
        }
    </script>
</body>
</html>
