<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KRASZINO</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #120924, #05020a);
            color: white;
            text-align: center;
            margin: 0;
            padding: 8px;
            -webkit-user-select: none;
            user-select: none;
            box-sizing: border-box;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .balance {
            font-size: 16px;
            font-weight: bold;
            color: #00ffcc;
        }
        h1 {
            font-size: 18px;
            color: #ffcc00;
            margin: 4px 0;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.3);
        }
        .game-container {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin: 10px 0;
        }
        .cell {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #2a1b4e, #1a1033);
            border-radius: 6px;
            border: 1px solid #3d2873;
            box-shadow: 0 3px 5px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.1s ease;
        }
        .cell:active {
            transform: scale(0.92);
        }
        .cell.safe {
            background: linear-gradient(135deg, #00b37e, #008057);
            border-color: #00ffaa;
        }
        .cell.mine {
            background: linear-gradient(135deg, #e63946, #b31621);
            border-color: #ff6b6b;
        }
        .controls {
            margin-top: 8px;
        }
        select, input, .btn {
            width: 100%;
            padding: 10px;
            margin: 4px 0;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: bold;
            box-sizing: border-box;
        }
        select, input {
            background: #22153f;
            color: white;
            border: 1px solid #3d2873;
        }
        .btn {
            background: linear-gradient(135deg, #ffcc00, #ff9900);
            color: #120924;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 204, 0, 0.3);
        }
        .btn:disabled {
            background: #443b5c;
            color: #888;
            box-shadow: none;
        }
        .status {
            font-size: 13px;
            color: #b3a2cf;
            margin: 4px 0;
            min-height: 18px;
        }
    </style>
</head>
<body>

    <div class="header">
        <span style="color: #b3a2cf; font-size: 14px;">🎰 KRASZINO</span>
        <div class="balance">💰 <span id="balance-val">1000</span> ПАЙ</div>
    </div>

    <h1>💣 ИГРА: МИНЫ 💣</h1>
    
    <div class="game-container">
        <div class="status" id="game-status">Установите ставку и нажмите «Играть»</div>
        
        <div class="grid" id="mine-grid"></div>

        <div class="controls">
            <input type="number" id="bet-input" value="100" min="10" step="10" placeholder="Размер ставки">
            <select id="mines-count">
                <option value="3">3 мины</option>
                <option value="5" selected>5 мин</option>
                <option value="10">10 мин</option>
                <option value="15">15 мин</option>
            </select>
            <button class="btn" id="action-btn" onclick="startGame()">Начать игру</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let balance = 1000;
        let bet = 100;
        let minesCount = 5;
        let gameActive = false;
        let gridData = [];
        let clickedCount = 0;
        let currentMultiplier = 1.0;

        const gridEl = document.getElementById('mine-grid');
        const statusEl = document.getElementById('game-status');
        const actionBtn = document.getElementById('action-btn');
        const balanceEl = document.getElementById('balance-val');

        function initGrid() {
            gridEl.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                gridEl.appendChild(cell);
            }
        }

        function startGame() {
            if (gameActive) {
                cashOut();
                return;
            }

            bet = parseInt(document.getElementById('bet-input').value);
            minesCount = parseInt(document.getElementById('mines-count').value);

            if (isNaN(bet) || bet <= 0 || bet > balance) {
                tg.showAlert('Недостаточно баланса или неверная ставка!');
                return;
            }

            balance -= bet;
            balanceEl.innerText = balance;
            gameActive = true;
            clickedCount = 0;
            currentMultiplier = 1.0;
            
            gridData = new Array(25).fill(false);
            let placedMines = 0;
            while (placedMines < minesCount) {
                let idx = Math.floor(Math.random() * 25);
                if (!gridData[idx]) {
                    gridData[idx] = true;
                    placedMines++;
                }
            }

            initGrid();
            document.getElementById('bet-input').disabled = true;
            document.getElementById('mines-count').disabled = true;
            actionBtn.innerText = 'Забрать куш (x1.00)';
            statusEl.innerText = 'Игра началась! Ищите алмазы 💎';
            statusEl.style.color = '#fff';
            
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function handleCellClick(idx) {
            if (!gameActive) return;
            const cells = document.getElementsByClassName('cell');
            const cell = cells[idx];
            
            if (cell.classList.contains('safe') || cell.classList.contains('mine')) return;

            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');

            if (gridData[idx]) {
                cell.classList.add('mine');
                cell.innerText = '💣';
                gameOver(false);
            } else {
                cell.classList.add('safe');
                cell.innerText = '💎';
                clickedCount++;
                
                currentMultiplier = (1 + (clickedCount * (minesCount / 10))).toFixed(2);
                actionBtn.innerText = `Забрать куш (x${currentMultiplier})`;
                statusEl.innerText = `Открыто алмазов: ${clickedCount}! x${currentMultiplier}`;
                statusEl.style.color = '#00ffcc';

                if (clickedCount === (25 - minesCount)) {
                    cashOut();
                }
            }
        }

        function cashOut() {
            if (!gameActive) return;
            let winAmount = Math.floor(bet * currentMultiplier);
            balance += winAmount;
            balanceEl.innerText = balance;
            
            statusEl.innerText = `Вы выиграли ${winAmount} ПАЙ! (x${currentMultiplier})`;
            statusEl.style.color = '#ffcc00';
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            gameOver(true);
        }

        function gameOver(isWin) {
            gameActive = false;
            document.getElementById('bet-input').disabled = false;
            document.getElementById('mines-count').disabled = false;
            actionBtn.innerText = 'Начать игру';

            if (!isWin) {
                statusEl.innerText = 'БАБАХ! Вы подорвались на мине.';
                statusEl.style.color = '#ff6b6b';
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            }

            const cells = document.getElementsByClassName('cell');
            for (let i = 0; i < 25; i++) {
                if (gridData[i]) {
                    cells[i].classList.add('mine');
                    cells[i].innerText = '💣';
                }
            }
        }

        initGrid();
    </script>
</body>
</html>
